name: Production Maintenance

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: production-maintenance
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Run bounded maintenance batches
        env:
          APP_URL: https://www.gegarap.id
        run: |
          set -euo pipefail
          oidc_token="$(
            curl --fail-with-body --silent --show-error \
              -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=gegarap-production-maintenance" \
              | jq -er '.value'
          )"
          for path in auto-cancel reconcile auto-release dispatch-outbox; do
            curl --fail-with-body --silent --show-error \
              --retry 3 --retry-all-errors --max-time 70 \
              -H "Authorization: Bearer $oidc_token" \
              "$APP_URL/api/cron/$path"
          done
